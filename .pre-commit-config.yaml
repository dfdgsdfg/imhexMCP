# Pre-commit hooks configuration
# Install pre-commit: pip install pre-commit
# Setup: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(patches/|\.gitignore)
      - id: end-of-file-fixer
        exclude: ^patches/
      - id: check-yaml
        args: ['--safe']
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-toml
      - id: check-json
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Python code formatting with Black
  - repo: https://github.com/psf/black
    rev: 24.2.0
    hooks:
      - id: black
        language_version: python3
        files: ^(lib/|mcp-server/).*\.py$
        exclude: ^(patches/|ImHex/|\.hypothesis/)

  # Import sorting with isort
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ['--profile', 'black']
        files: ^(lib/|mcp-server/).*\.py$
        exclude: ^(patches/|ImHex/|\.hypothesis/)

  # Linting with Ruff (fast Python linter)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.2.2
    hooks:
      - id: ruff
        args: ['--fix', '--exit-non-zero-on-fix']
        files: ^(lib/|mcp-server/).*\.py$
        exclude: ^(patches/|ImHex/|\.hypothesis/|test_)

  # Type checking with mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        files: ^lib/.*\.py$
        exclude: ^(lib/test_|patches/|ImHex/|\.hypothesis/)
        args: ['--ignore-missing-imports', '--strict-optional']
        additional_dependencies:
          - 'pytest>=7.0.0'
          - 'pytest-asyncio>=0.21.0'
          - 'hypothesis>=6.0.0'

  # Security checks with bandit
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        args: ['-ll', '-i']  # Low severity, ignore imports
        files: ^(lib/|mcp-server/).*\.py$
        exclude: ^(lib/test_|patches/|ImHex/)

  # Docstring checks with pydocstyle
  - repo: https://github.com/PyCQA/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        args: ['--ignore=D100,D101,D102,D103,D104,D105,D107,D203,D213']
        files: ^lib/(security|caching|batching|config_loader|metrics)\.py$
        exclude: ^lib/test_

  # Commit message checks
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.15.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

# CI skip: Set SKIP=mypy,pytest to skip slow checks during development
# Example: SKIP=mypy pre-commit run --all-files
