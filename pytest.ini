[pytest]
# Pytest Configuration for ImHex MCP

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = mcp-server lib

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=lib
    --cov=mcp-server
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --asyncio-mode=auto

# Markers for organizing tests
markers =
    unit: Unit tests that don't require external dependencies
    integration: Integration tests that require ImHex running
    slow: Tests that take more than 1 second
    compression: Compression-related tests
    async: Asynchronous tests
    network: Tests that require network access
    benchmark: Performance benchmark tests

# Asyncio configuration
asyncio_default_fixture_loop_scope = function

# Coverage options
[coverage:run]
source = lib,mcp-server
omit =
    */tests/*
    */test_*
    */venv/*
    */__pycache__/*
    */benchmark_*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
