name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        cd mcp-server
        python -m venv venv
        source venv/bin/activate
        pip install -r requirements.txt || pip install pytest pytest-asyncio pytest-cov hypothesis

    - name: Run tests with coverage
      run: |
        cd mcp-server
        source venv/bin/activate
        pytest ../lib/test_*.py --cov=../lib --cov-report=term --cov-report=xml --cov-report=html -v

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      uses: codecov/codecov-action@v5
      with:
        file: ./mcp-server/coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Upload coverage HTML
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ matrix.os }}-py${{ matrix.python-version }}
        path: coverage_html/
        retention-days: 30

  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install mypy ruff black isort

    - name: Check code formatting with black
      run: |
        black --check lib/ mcp-server/ || true

    - name: Check import sorting with isort
      run: |
        isort --check-only lib/ mcp-server/ || true

    - name: Lint with ruff
      run: |
        ruff check lib/ mcp-server/ || true

    - name: Type check with mypy
      run: |
        mypy --ignore-missing-imports lib/ || true

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install safety
      run: |
        python -m pip install --upgrade pip
        pip install safety

    - name: Run safety check
      run: |
        cd mcp-server
        pip install -r requirements.txt || echo "No requirements.txt found"
        safety check || true
