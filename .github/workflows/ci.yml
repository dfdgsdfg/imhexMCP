name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  lint-and-typecheck:
    name: Lint and Type Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mypy black flake8 psutil

    - name: Check code formatting with black
      run: |
        black --check benchmarks/ tests/ || echo "::warning::Code formatting issues found. Run 'black benchmarks/ tests/' to fix."
      continue-on-error: true

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 benchmarks/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Treat all other issues as warnings
        flake8 benchmarks/ tests/ --count --max-line-length=120 --statistics || echo "::warning::Linting issues found"
      continue-on-error: true

    - name: Type check with mypy
      run: |
        mypy --install-types --non-interactive benchmarks/ tests/ || echo "::warning::Type checking issues found"
      continue-on-error: true

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install ImHex dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake ninja-build \
          libglfw3-dev libglm-dev libmbedtls-dev \
          libfreetype6-dev libcurl4-openssl-dev \
          nlohmann-json3-dev libcapstone-dev libyara-dev

    - name: Build ImHex
      run: |
        mkdir -p ImHex/build
        cd ImHex/build
        cmake -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DIMHEX_ENABLE_UNITY_BUILD=ON \
          ..
        ninja
      continue-on-error: true

    - name: Note about integration tests
      run: |
        echo "::notice::Integration tests require a running ImHex instance with Network Interface enabled."
        echo "::notice::These tests are designed to run locally where ImHex can be started."
        echo "::notice::In CI, we validate the test structure and dependencies instead."

    - name: Validate test structure
      run: |
        python3 tests/integration/test_all_endpoints.py --help || true
        python3 -m py_compile tests/integration/test_all_endpoints.py
        echo "✓ Test file structure is valid"

  benchmark-validation:
    name: Validate Benchmarks
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install psutil

    - name: Validate benchmark tools
      run: |
        python3 benchmarks/endpoint_benchmarks.py --help
        python3 benchmarks/profile_imhex.py --help
        python3 -m py_compile benchmarks/endpoint_benchmarks.py
        python3 -m py_compile benchmarks/profile_imhex.py
        echo "✓ Benchmark tools are valid"

    - name: Check for syntax errors
      run: |
        python3 -m py_compile benchmarks/*.py
        python3 -m py_compile tests/integration/*.py
        echo "✓ No Python syntax errors found"

  documentation:
    name: Check Documentation
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check for broken links in markdown
      uses: gaurav-nelson/github-action-markdown-link-check@v1
      with:
        use-quiet-mode: 'yes'
        config-file: '.github/markdown-link-check-config.json'
      continue-on-error: true

    - name: Verify documentation completeness
      run: |
        echo "Checking for required documentation files..."
        test -f README.md && echo "✓ README.md exists"
        test -f docs/API.md && echo "✓ docs/API.md exists"
        test -f docs/ARCHITECTURE.md && echo "✓ docs/ARCHITECTURE.md exists"
        test -f docs/ROADMAP.md && echo "✓ docs/ROADMAP.md exists"
        test -f benchmarks/README.md && echo "✓ benchmarks/README.md exists"
        test -f tests/integration/README.md && echo "✓ tests/integration/README.md exists"
        echo "✓ All required documentation exists"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy security scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
      continue-on-error: true

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'
      continue-on-error: true

  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, integration-tests, benchmark-validation, documentation, security-scan]
    if: always()

    steps:
    - name: Generate summary
      run: |
        echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ Lint and Type Check: ${{ needs.lint-and-typecheck.result }}" >> $GITHUB_STEP_SUMMARY
        echo "✅ Integration Tests: ${{ needs.integration-tests.result }}" >> $GITHUB_STEP_SUMMARY
        echo "✅ Benchmark Validation: ${{ needs.benchmark-validation.result }}" >> $GITHUB_STEP_SUMMARY
        echo "✅ Documentation: ${{ needs.documentation.result }}" >> $GITHUB_STEP_SUMMARY
        echo "✅ Security Scan: ${{ needs.security-scan.result }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Status**: All checks completed" >> $GITHUB_STEP_SUMMARY
