name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r mcp-server/requirements.txt
        pip install -r mcp-server/dev-requirements.txt

    - name: Lint with ruff
      run: |
        ruff check lib/ mcp-server/ --output-format=github

    - name: Format check with black
      run: |
        black --check lib/ mcp-server/

    - name: Type check with mypy
      run: |
        mypy lib/ mcp-server/ --ignore-missing-imports || true
      continue-on-error: true  # Don't fail build on type errors yet

    - name: Run unit tests
      run: |
        pytest -m unit -v --tb=short --cov=lib --cov=mcp-server \
               --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-${{ matrix.os }}-py${{ matrix.python-version }}
        fail_ci_if_error: false

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r mcp-server/requirements.txt
        pip install -r mcp-server/dev-requirements.txt

    # Note: Integration tests require ImHex running
    # Skip for now unless we can set up ImHex in CI
    - name: Run integration tests
      run: |
        echo "Integration tests require ImHex - skipping in CI"
        # pytest -m integration -v --tb=short
      continue-on-error: true
