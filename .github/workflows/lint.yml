name: Lint

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install black ruff isort mypy

    - name: Check formatting with Black
      run: |
        black --check --diff lib/ mcp-server/

    - name: Check import sorting with isort
      run: |
        isort --check-only --diff lib/ mcp-server/

    - name: Lint with Ruff
      run: |
        ruff check lib/ mcp-server/ --output-format=github

    - name: Type check with mypy
      run: |
        mypy lib/ mcp-server/ --ignore-missing-imports --install-types --non-interactive
      continue-on-error: true  # Don't fail build on type errors yet

  complexity:
    name: Code Complexity
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install radon
      run: |
        pip install radon

    - name: Check cyclomatic complexity
      run: |
        radon cc lib/ mcp-server/ -a -s

    - name: Check maintainability index
      run: |
        radon mi lib/ mcp-server/ -s
